<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Width Responsive</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 class="title">Responsive Using Max-Width</h1>

<div class="container">

    <div class="box">
        <h2>Desktop</h2>
        <p>Full layout is shown on large screens.</p>
    </div>

    <div class="box">
        <h2>Tablet</h2>
        <p>Layout adjusts for medium screen size.</p>
    </div>

    <div class="box">
        <h2>Mobile</h2>
        <p>Layout stacks for small screens.</p>
    </div>

    <div class="box">
        <h2>Media Query</h2>
        <p>Max-width is used to reduce layout step by step.</p>
    </div>

</div>

</body>
</html>
