<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Width Responsive</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 class="title">Responsive Using Min-Width</h1>

<div class="container">

    <div class="box">
        <h2>Mobile</h2>
        <p>This layout is designed for small screen devices.</p>
    </div>

    <div class="box">
        <h2>Tablet</h2>
        <p>Layout changes for medium screen size.</p>
    </div>

    <div class="box">
        <h2>Desktop</h2>
        <p>Full layout is visible on large screens.</p>
    </div>

    <div class="box">
        <h2>Media Query</h2>
        <p>Min-width is used to increase layout step by step.</p>
    </div>

</div>

</body>
</html>
